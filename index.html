<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pump Reminders</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1a7a3c;
      --green-main: #2ecc71;
      --green-light: #a8e6c1;
      --green-pale: #e8f8ee;
      --white: #ffffff;
      --text-dark: #1a2e22;
      --text-muted: #5a7a65;
      --shadow: 0 2px 12px rgba(46,204,113,0.15);
      --shadow-hover: 0 6px 24px rgba(46,204,113,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--green-pale);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── AUTH ── */
    #authScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .auth-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-hover);
    }

    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .auth-logo-icon {
      width: 40px; height: 40px; background: var(--green-dark);
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-size: 20px;
    }
    .auth-logo-text { font-size: 1.4rem; font-weight: 700; color: var(--text-dark); }

    .auth-tabs {
      display: flex; margin-bottom: 24px;
      border-bottom: 2px solid var(--green-light);
    }
    .auth-tab {
      flex: 1; padding: 10px; text-align: center; font-weight: 600;
      font-size: 0.9rem; cursor: pointer; border: none; background: transparent;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      margin-bottom: -2px; transition: all 0.2s;
    }
    .auth-tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }

    .auth-field { margin-bottom: 14px; }
    .auth-label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--text-muted); margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.4px;
    }
    .auth-input {
      width: 100%; border: 2px solid var(--green-light); border-radius: 10px;
      padding: 10px 14px; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s; color: var(--text-dark);
    }
    .auth-input:focus { border-color: var(--green-main); }

    .auth-btn {
      width: 100%; background: var(--green-dark); color: white; border: none;
      border-radius: 10px; padding: 12px; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 6px; transition: background 0.2s, transform 0.1s;
    }
    .auth-btn:hover { background: var(--green-main); }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-error {
      background: #fde8e8; color: #c0392b; border-radius: 8px;
      padding: 10px 14px; font-size: 0.85rem; margin-bottom: 14px; display: none;
    }
    .auth-success {
      background: #d4f5e2; color: var(--green-dark); border-radius: 8px;
      padding: 10px 14px; font-size: 0.85rem; margin-bottom: 14px; display: none;
    }

    /* ── APP ── */
    #appScreen { display: none; }

    header {
      background: var(--green-dark); color: white;
      padding: 0 24px; display: flex; align-items: center;
      justify-content: space-between; height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; font-weight: 700; }
    .logo-icon {
      width: 32px; height: 32px; background: var(--green-main);
      border-radius: 8px; display: flex; align-items: center;
      justify-content: center; font-size: 17px;
    }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .user-email { font-size: 0.8rem; opacity: 0.75; }
    .signout-btn {
      background: rgba(255,255,255,0.15); border: none; color: white;
      padding: 6px 12px; border-radius: 8px; font-size: 0.8rem;
      cursor: pointer; transition: background 0.2s;
    }
    .signout-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── NAV TABS ── */
    .app-nav {
      background: var(--white);
      border-bottom: 1px solid #dceee4;
      display: flex;
      padding: 0 24px;
    }
    .nav-tab {
      padding: 14px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
    }
    .nav-tab.active { color: var(--green-dark); border-bottom-color: var(--green-dark); }
    .nav-tab:hover:not(.active) { color: var(--text-dark); }

    /* ── MAIN ── */
    main { max-width: 720px; margin: 0 auto; padding: 28px 16px 80px; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Call Today */
    .call-today-section {
      background: var(--green-dark); border-radius: 16px;
      padding: 20px 22px; margin-bottom: 24px; color: white;
      box-shadow: 0 4px 20px rgba(26,122,60,0.35);
    }
    .call-today-header { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .call-today-header h2 { font-size: 1.15rem; font-weight: 700; }
    .call-badge {
      background: var(--green-main); color: white;
      font-size: 0.75rem; font-weight: 700; padding: 2px 9px; border-radius: 20px;
    }
    .call-list { display: flex; flex-direction: column; gap: 8px; }
    .call-item {
      background: rgba(255,255,255,0.12); border-radius: 10px;
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
    }
    .call-item.called { opacity: 0.5; }
    .call-item.called .call-name { text-decoration: line-through; }
    .call-check {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5); background: transparent;
      cursor: pointer; flex-shrink: 0; display: flex; align-items: center;
      justify-content: center; font-size: 13px; color: transparent; transition: all 0.2s;
    }
    .call-item.called .call-check { background: var(--green-main); border-color: var(--green-main); color: white; }
    .call-check:hover { background: rgba(255,255,255,0.2); }
    .call-name { flex: 1; font-weight: 600; font-size: 1rem; }
    .call-meta { font-size: 0.78rem; opacity: 0.7; }
    .empty-call { text-align: center; padding: 16px; opacity: 0.65; font-size: 0.9rem; }

    /* Add form */
    .add-form {
      background: var(--white); border-radius: 16px;
      padding: 20px; margin-bottom: 24px; box-shadow: var(--shadow);
    }
    .add-form h2 {
      font-size: 0.8rem; color: var(--text-muted); margin-bottom: 14px;
      text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
    }
    .form-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .form-input {
      flex: 1; border: 2px solid var(--green-light); border-radius: 10px;
      padding: 10px 14px; font-size: 0.95rem; outline: none;
      transition: border-color 0.2s; color: var(--text-dark); background: var(--white);
      min-width: 120px;
    }
    .form-input:focus { border-color: var(--green-main); }
    .form-input::placeholder { color: #aac4b5; }
    .date-input { width: 150px; flex: none; }
    .add-btn {
      background: var(--green-main); color: white; border: none;
      border-radius: 10px; padding: 10px 20px; font-size: 0.95rem;
      font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--green-dark); }
    .add-btn:active { transform: scale(0.97); }

    /* Pipeline */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 1.1rem; font-weight: 700; }
    .pipeline-list { display: flex; flex-direction: column; gap: 10px; }
    .pipeline-item {
      background: var(--white); border-radius: 14px; padding: 14px 18px;
      display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.1s; border-left: 4px solid var(--green-main);
    }
    .pipeline-item:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .pipeline-item.upcoming { border-left-color: #f0a500; }
    .pipeline-item.overdue { border-left-color: #e74c3c; }
    .pipeline-info { flex: 1; }
    .pipeline-name { font-size: 0.95rem; font-weight: 600; }
    .pipeline-dates { font-size: 0.78rem; color: var(--text-muted); margin-top: 3px; display: flex; gap: 14px; flex-wrap: wrap; }
    .status-pill {
      font-size: 0.72rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.3px; white-space: nowrap;
    }
    .pill-soon     { background: #d4f5e2; color: var(--green-dark); }
    .pill-upcoming { background: #fff3cd; color: #7a5500; }
    .pill-overdue  { background: #fde8e8; color: #c0392b; }
    .pill-called   { background: #f0f0f0; color: var(--text-muted); }

    .delete-btn {
      background: transparent; border: none; cursor: pointer;
      color: #ccc; font-size: 18px; padding: 4px 6px; border-radius: 6px;
      transition: color 0.2s, background 0.2s; line-height: 1;
    }
    .delete-btn:hover { color: #e74c3c; background: #fff0f0; }

    /* ── EXPORT TAB ── */
    .export-header {
      background: var(--white); border-radius: 16px;
      padding: 18px 20px; margin-bottom: 16px; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .export-header-left { display: flex; align-items: center; gap: 12px; }
    .select-all-label {
      display: flex; align-items: center; gap: 8px;
      font-weight: 600; font-size: 0.9rem; cursor: pointer; user-select: none;
    }
    .selected-count { font-size: 0.85rem; color: var(--text-muted); }

    .export-btn {
      background: var(--green-dark); color: white; border: none;
      border-radius: 10px; padding: 10px 22px; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; transition: background 0.2s, transform 0.1s;
      white-space: nowrap; letter-spacing: 0.3px;
    }
    .export-btn:hover { background: #145a2d; }
    .export-btn:active { transform: scale(0.97); }
    .export-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .export-list { display: flex; flex-direction: column; gap: 8px; }

    .export-item {
      background: var(--white); border-radius: 12px; padding: 14px 18px;
      display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow);
      cursor: pointer; transition: box-shadow 0.15s;
      border: 2px solid transparent;
    }
    .export-item:hover { box-shadow: var(--shadow-hover); }
    .export-item.selected { border-color: var(--green-main); background: #f4fdf7; }

    .export-checkbox {
      width: 20px; height: 20px; border-radius: 5px;
      border: 2px solid var(--green-light); background: white;
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: transparent; transition: all 0.15s;
    }
    .export-item.selected .export-checkbox {
      background: var(--green-main); border-color: var(--green-main); color: white;
    }

    .export-info { flex: 1; }
    .export-name { font-size: 0.95rem; font-weight: 600; }
    .export-email { font-size: 0.82rem; color: var(--text-muted); margin-top: 1px; }
    .export-date { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

    /* Shared */
    .empty-state { text-align: center; padding: 48px 16px; color: var(--text-muted); }
    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }
    .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; }

    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green-dark); color: white;
      padding: 10px 20px; border-radius: 24px; font-size: 0.9rem; font-weight: 500;
      transition: transform 0.3s ease; pointer-events: none; z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 520px) {
      .date-input { width: 100%; }
      .user-email { display: none; }
      .export-header { flex-direction: column; align-items: flex-start; }
      .export-btn { width: 100%; text-align: center; }
    }
  </style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">📞</div>
      <div class="auth-logo-text">Pump Reminders</div>
    </div>
    <div id="authError" class="auth-error"></div>
    <div id="authSuccess" class="auth-success"></div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>
    <div id="loginForm">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input type="email" class="auth-input" id="loginEmail" placeholder="you@company.com" />
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input type="password" class="auth-input" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="auth-btn" id="loginBtn" onclick="signIn()">Sign In</button>
    </div>
    <div id="signupForm" style="display:none">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input type="email" class="auth-input" id="signupEmail" placeholder="you@company.com" />
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input type="password" class="auth-input" id="signupPassword" placeholder="Min. 6 characters" />
      </div>
      <button class="auth-btn" id="signupBtn" onclick="signUp()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appScreen">
  <header>
    <div class="logo">
      <div class="logo-icon">📞</div>
      Pump Reminders
    </div>
    <div class="header-right">
      <span class="user-email" id="userEmail"></span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <nav class="app-nav">
    <button class="nav-tab active" onclick="switchAppTab('contacts', this)">Contacts</button>
    <button class="nav-tab" onclick="switchAppTab('export', this)">Export to Apollo</button>
  </nav>

  <main>

    <!-- CONTACTS TAB -->
    <div class="tab-panel active" id="tab-contacts">

      <div class="call-today-section">
        <div class="call-today-header">
          <h2>Call Today</h2>
          <span class="call-badge" id="callBadge">0</span>
        </div>
        <div class="call-list" id="callList">
          <div class="empty-call">Loading...</div>
        </div>
      </div>

      <div class="add-form">
        <h2>Log an email sent</h2>
        <div class="form-row">
          <input type="text" class="form-input" id="nameInput" placeholder="Contact name..." maxlength="60" />
          <input type="email" class="form-input" id="contactEmailInput" placeholder="their@email.com" />
          <input type="date" class="form-input date-input" id="dateInput" />
          <button class="add-btn" onclick="addContact()">+ Add</button>
        </div>
      </div>

      <div class="section-header">
        <span class="section-title">All Contacts</span>
      </div>
      <div class="pipeline-list" id="pipelineList">
        <div class="loading">Loading your contacts...</div>
      </div>

    </div>

    <!-- EXPORT TAB -->
    <div class="tab-panel" id="tab-export">

      <div class="export-header">
        <div class="export-header-left">
          <label class="select-all-label">
            <input type="checkbox" id="selectAllChk" onchange="toggleSelectAll()" />
            Select all
          </label>
          <span class="selected-count" id="selectedCount">0 selected</span>
        </div>
        <button class="export-btn" id="exportBtn" onclick="exportCSV()" disabled>
          Export Sequence CSV
        </button>
      </div>

      <div class="export-list" id="exportList">
        <div class="loading">Loading...</div>
      </div>

    </div>

  </main>
</div>

<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://gypurcvjlzmbhzdszugx.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_TKBfJlQvpwwMtc_ZLUKcRQ_BUtCVQyu';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let contacts = [];
  let selectedIds = new Set();

  // ── AUTH ──

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('loginForm').style.display  = tab === 'login'  ? '' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
    clearAuthMessages();
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('authSuccess').style.display = 'none';
  }

  function showAuthSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  }

  function clearAuthMessages() {
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
  }

  async function signIn() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showAuthError('Please enter your email and password.'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    const { error } = await db.auth.signInWithPassword({ email, password });
    btn.disabled = false; btn.textContent = 'Sign In';
    if (error) showAuthError(error.message);
  }

  async function signUp() {
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!email || !password) { showAuthError('Please fill in all fields.'); return; }
    if (password.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    const { error } = await db.auth.signUp({ email, password });
    btn.disabled = false; btn.textContent = 'Create Account';
    if (error) showAuthError(error.message);
    else showAuthSuccess('Account created! You can now sign in.');
  }

  async function signOut() {
    await db.auth.signOut();
  }

  db.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user ?? null;
    if (currentUser) {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      document.getElementById('userEmail').textContent = currentUser.email;
      document.getElementById('dateInput').value = todayStr();
      loadContacts();
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
      contacts = [];
    }
  });

  // ── APP TABS ──

  function switchAppTab(tab, btn) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'export') renderExport();
  }

  // ── DATA ──

  async function loadContacts() {
    const { data, error } = await db
      .from('contacts')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { showToast('Error loading contacts.'); return; }
    contacts = data || [];
    render();
  }

  async function addContact() {
    const nameInput = document.getElementById('nameInput');
    const emailInput = document.getElementById('contactEmailInput');
    const dateInput = document.getElementById('dateInput');
    const name = nameInput.value.trim();
    const email = emailInput.value.trim();
    const email_date = dateInput.value || todayStr();
    if (!name) { nameInput.focus(); showToast('Enter a contact name.'); return; }

    const { data, error } = await db
      .from('contacts')
      .insert({ name, email, email_date, called: false, user_id: currentUser.id })
      .select()
      .single();

    if (error) { showToast('Error adding contact.'); return; }
    contacts.unshift(data);
    render();
    nameInput.value = '';
    emailInput.value = '';
    dateInput.value = todayStr();
    nameInput.focus();
    showToast('Contact added!');
  }

  async function toggleCalled(id) {
    const c = contacts.find(c => c.id === id);
    if (!c) return;
    const { error } = await db.from('contacts').update({ called: !c.called }).eq('id', id);
    if (error) { showToast('Error updating.'); return; }
    c.called = !c.called;
    render();
    showToast(c.called ? 'Marked as called!' : 'Unmarked.');
  }

  async function deleteContact(id) {
    const { error } = await db.from('contacts').delete().eq('id', id);
    if (error) { showToast('Error deleting.'); return; }
    contacts = contacts.filter(c => c.id !== id);
    selectedIds.delete(id);
    render();
    showToast('Removed.');
  }

  // ── CONTACTS RENDER ──

  function todayStr() { return new Date().toISOString().split('T')[0]; }

  function callDateFor(emailDate) {
    const d = new Date(emailDate + 'T00:00:00');
    d.setDate(d.getDate() + 7);
    return d.toISOString().split('T')[0];
  }

  function formatDate(str) {
    return new Date(str + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function daysUntil(dateStr) {
    const today = new Date(todayStr() + 'T00:00:00');
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const today = todayStr();
    const callToday = contacts.filter(c => callDateFor(c.email_date) === today);
    const rest = contacts.filter(c => callDateFor(c.email_date) !== today);

    // Call Today
    document.getElementById('callBadge').textContent = callToday.filter(c => !c.called).length;
    const callList = document.getElementById('callList');
    if (callToday.length === 0) {
      callList.innerHTML = '<div class="empty-call">No one to call today — check back tomorrow.</div>';
    } else {
      callList.innerHTML = callToday.map(c => `
        <div class="call-item ${c.called ? 'called' : ''}">
          <button class="call-check" onclick="toggleCalled('${c.id}')">✓</button>
          <div class="call-name">${escapeHtml(c.name)}</div>
          <div class="call-meta">Emailed ${formatDate(c.email_date)}</div>
        </div>
      `).join('');
    }

    // All contacts
    const sorted = [...rest].sort((a, b) => callDateFor(b.email_date).localeCompare(callDateFor(a.email_date)));
    const pipeline = document.getElementById('pipelineList');

    if (contacts.length === 0) {
      pipeline.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Log an email above to get started.</p></div>`;
      return;
    }
    if (sorted.length === 0) {
      pipeline.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><p>Everyone is in the "Call Today" list.</p></div>`;
      return;
    }

    pipeline.innerHTML = sorted.map(c => {
      const callDate = callDateFor(c.email_date);
      const diff = daysUntil(callDate);
      let statusClass, pillClass, pillLabel;
      if (c.called) {
        statusClass = ''; pillClass = 'pill-called'; pillLabel = 'Called';
      } else if (diff < 0) {
        statusClass = 'overdue'; pillClass = 'pill-overdue'; pillLabel = `${Math.abs(diff)}d overdue`;
      } else if (diff <= 2) {
        statusClass = 'upcoming'; pillClass = 'pill-upcoming'; pillLabel = diff === 0 ? 'Today' : `In ${diff}d`;
      } else {
        statusClass = ''; pillClass = 'pill-soon'; pillLabel = `In ${diff}d`;
      }
      return `
        <div class="pipeline-item ${statusClass}">
          <div class="pipeline-info">
            <div class="pipeline-name">${escapeHtml(c.name)}</div>
            <div class="pipeline-dates">
              <span>📧 Emailed ${formatDate(c.email_date)}</span>
              <span>📞 Call ${formatDate(callDate)}</span>
              ${c.email ? `<span>✉️ ${escapeHtml(c.email)}</span>` : ''}
            </div>
          </div>
          <span class="status-pill ${pillClass}">${pillLabel}</span>
          <button class="delete-btn" onclick="deleteContact('${c.id}')">✕</button>
        </div>
      `;
    }).join('');
  }

  // ── EXPORT ──

  function renderExport() {
    const list = document.getElementById('exportList');
    if (contacts.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>No contacts to export yet.</p></div>`;
      updateExportUI();
      return;
    }

    const sorted = [...contacts].sort((a, b) => b.email_date.localeCompare(a.email_date));
    list.innerHTML = sorted.map(c => `
      <div class="export-item ${selectedIds.has(c.id) ? 'selected' : ''}" onclick="toggleSelect('${c.id}')">
        <div class="export-checkbox">✓</div>
        <div class="export-info">
          <div class="export-name">${escapeHtml(c.name)}</div>
          <div class="export-email">${c.email ? escapeHtml(c.email) : '<span style="opacity:0.5">No email on file</span>'}</div>
        </div>
        <div class="export-date">Day email sent:<br/><strong>${formatDate(c.email_date)}</strong></div>
      </div>
    `).join('');

    updateExportUI();
  }

  function toggleSelect(id) {
    if (selectedIds.has(id)) selectedIds.delete(id);
    else selectedIds.add(id);
    renderExport();
  }

  function toggleSelectAll() {
    const allIds = contacts.map(c => c.id);
    if (selectedIds.size === allIds.length) {
      selectedIds.clear();
    } else {
      allIds.forEach(id => selectedIds.add(id));
    }
    renderExport();
  }

  function updateExportUI() {
    const count = selectedIds.size;
    document.getElementById('selectedCount').textContent = `${count} selected`;
    document.getElementById('exportBtn').disabled = count === 0;
    document.getElementById('selectAllChk').checked = contacts.length > 0 && selectedIds.size === contacts.length;
    document.getElementById('selectAllChk').indeterminate = selectedIds.size > 0 && selectedIds.size < contacts.length;
  }

  function exportCSV() {
    const selected = contacts.filter(c => selectedIds.has(c.id));
    if (selected.length === 0) return;

    const rows = [['First Name', 'Last Name', 'Email']];
    selected.forEach(c => {
      const parts = c.name.trim().split(/\s+/);
      const firstName = parts[0] || '';
      const lastName = parts.slice(1).join(' ') || '';
      rows.push([firstName, lastName, c.email || '']);
    });

    const csv = rows.map(r => r.map(cell => `"${(cell || '').replace(/"/g, '""')}"`).join(',')).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `apollo-sequence-${todayStr()}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    showToast(`Exported ${selected.length} contact${selected.length > 1 ? 's' : ''}!`);
  }

  // ── UTILS ──

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  document.getElementById('nameInput').addEventListener('keydown', e => { if (e.key === 'Enter') addContact(); });
  document.getElementById('loginPassword').addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
</script>
</body>
</html>
