<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pump Reminders</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #1a7a3c;
      --green-main: #2ecc71;
      --green-light: #a8e6c1;
      --green-pale: #e8f8ee;
      --white: #ffffff;
      --text-dark: #1a2e22;
      --text-muted: #5a7a65;
      --shadow: 0 2px 12px rgba(46,204,113,0.15);
      --shadow-hover: 0 6px 24px rgba(46,204,113,0.3);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--green-pale);
      color: var(--text-dark);
      min-height: 100vh;
    }

    /* ── AUTH SCREEN ── */
    #authScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .auth-card {
      background: var(--white);
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-hover);
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .auth-logo-icon {
      width: 40px;
      height: 40px;
      background: var(--green-dark);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .auth-logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--green-light);
    }

    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }

    .auth-tab.active {
      color: var(--green-dark);
      border-bottom-color: var(--green-dark);
    }

    .auth-field {
      margin-bottom: 14px;
    }

    .auth-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .auth-input {
      width: 100%;
      border: 2px solid var(--green-light);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text-dark);
    }

    .auth-input:focus { border-color: var(--green-main); }

    .auth-btn {
      width: 100%;
      background: var(--green-dark);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.1s;
    }

    .auth-btn:hover { background: var(--green-main); }
    .auth-btn:active { transform: scale(0.98); }
    .auth-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .auth-error {
      background: #fde8e8;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 14px;
      display: none;
    }

    .auth-success {
      background: #d4f5e2;
      color: var(--green-dark);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 14px;
      display: none;
    }

    /* ── APP SCREEN ── */
    #appScreen { display: none; }

    header {
      background: var(--green-dark);
      color: var(--white);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--green-main);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-email {
      font-size: 0.8rem;
      opacity: 0.75;
    }

    .signout-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .signout-btn:hover { background: rgba(255,255,255,0.25); }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 16px 80px;
    }

    /* Call Today */
    .call-today-section {
      background: var(--green-dark);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 24px;
      color: var(--white);
      box-shadow: 0 4px 20px rgba(26,122,60,0.35);
    }

    .call-today-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .call-today-header h2 { font-size: 1.15rem; font-weight: 700; }

    .call-badge {
      background: var(--green-main);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 9px;
      border-radius: 20px;
    }

    .call-list { display: flex; flex-direction: column; gap: 8px; }

    .call-item {
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .call-item.called { opacity: 0.5; }
    .call-item.called .call-name { text-decoration: line-through; }

    .call-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: transparent;
      transition: all 0.2s;
    }

    .call-item.called .call-check {
      background: var(--green-main);
      border-color: var(--green-main);
      color: white;
    }

    .call-check:hover { background: rgba(255,255,255,0.2); }
    .call-name { flex: 1; font-weight: 600; font-size: 1rem; }
    .call-meta { font-size: 0.78rem; opacity: 0.7; }

    .empty-call {
      text-align: center;
      padding: 16px;
      opacity: 0.65;
      font-size: 0.9rem;
    }

    /* Add form */
    .add-form {
      background: var(--white);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
    }

    .add-form h2 {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    .form-row { display: flex; gap: 10px; align-items: center; }

    .form-input {
      flex: 1;
      border: 2px solid var(--green-light);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text-dark);
      background: var(--white);
    }

    .form-input:focus { border-color: var(--green-main); }
    .form-input::placeholder { color: #aac4b5; }
    .date-input { width: 160px; flex: none; }

    .add-btn {
      background: var(--green-main);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .add-btn:hover { background: var(--green-dark); }
    .add-btn:active { transform: scale(0.97); }

    /* Pipeline */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-title { font-size: 1.1rem; font-weight: 700; }

    .pipeline-list { display: flex; flex-direction: column; gap: 10px; }

    .pipeline-item {
      background: var(--white);
      border-radius: 14px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: box-shadow 0.2s, transform 0.1s;
      border-left: 4px solid var(--green-main);
    }

    .pipeline-item:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
    .pipeline-item.upcoming { border-left-color: #f0a500; }
    .pipeline-item.overdue { border-left-color: #e74c3c; }

    .pipeline-info { flex: 1; }
    .pipeline-name { font-size: 0.95rem; font-weight: 600; }

    .pipeline-dates {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 3px;
      display: flex;
      gap: 14px;
    }

    .status-pill {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .pill-soon    { background: #d4f5e2; color: var(--green-dark); }
    .pill-upcoming { background: #fff3cd; color: #7a5500; }
    .pill-overdue  { background: #fde8e8; color: #c0392b; }
    .pill-called   { background: #f0f0f0; color: var(--text-muted); }

    .delete-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: #e74c3c; background: #fff0f0; }

    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--green-dark);
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.9rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      pointer-events: none;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 520px) {
      .form-row { flex-wrap: wrap; }
      .date-input { width: 100%; }
      .user-email { display: none; }
    }
  </style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">📞</div>
      <div class="auth-logo-text">Pump Reminders</div>
    </div>

    <div id="authError" class="auth-error"></div>
    <div id="authSuccess" class="auth-success"></div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="loginForm">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input type="email" class="auth-input" id="loginEmail" placeholder="you@company.com" />
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input type="password" class="auth-input" id="loginPassword" placeholder="••••••••" />
      </div>
      <button class="auth-btn" id="loginBtn" onclick="signIn()">Sign In</button>
    </div>

    <div id="signupForm" style="display:none">
      <div class="auth-field">
        <label class="auth-label">Email</label>
        <input type="email" class="auth-input" id="signupEmail" placeholder="you@company.com" />
      </div>
      <div class="auth-field">
        <label class="auth-label">Password</label>
        <input type="password" class="auth-input" id="signupPassword" placeholder="Min. 6 characters" />
      </div>
      <button class="auth-btn" id="signupBtn" onclick="signUp()">Create Account</button>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen">
  <header>
    <div class="logo">
      <div class="logo-icon">📞</div>
      Pump Reminders
    </div>
    <div class="header-right">
      <span class="user-email" id="userEmail"></span>
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </header>

  <main>
    <div class="call-today-section">
      <div class="call-today-header">
        <h2>Call Today</h2>
        <span class="call-badge" id="callBadge">0</span>
      </div>
      <div class="call-list" id="callList">
        <div class="empty-call">Loading...</div>
      </div>
    </div>

    <div class="add-form">
      <h2>Log an email sent</h2>
      <div class="form-row">
        <input type="text" class="form-input" id="nameInput" placeholder="Contact name..." maxlength="60" />
        <input type="date" class="form-input date-input" id="dateInput" />
        <button class="add-btn" onclick="addContact()">+ Add</button>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">All Contacts</span>
    </div>

    <div class="pipeline-list" id="pipelineList">
      <div class="loading">Loading your contacts...</div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
  const SUPABASE_URL = 'https://gypurcvjlzmbhzdszugx.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_TKBfJlQvpwwMtc_ZLUKcRQ_BUtCVQyu';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let currentUser = null;
  let contacts = [];

  // ── AUTH ──

  function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('loginForm').style.display  = tab === 'login'  ? '' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? '' : 'none';
    clearAuthMessages();
  }

  function showAuthError(msg) {
    const el = document.getElementById('authError');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authSuccess').style.display = 'none';
  }

  function showAuthSuccess(msg) {
    const el = document.getElementById('authSuccess');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  }

  function clearAuthMessages() {
    document.getElementById('authError').style.display = 'none';
    document.getElementById('authSuccess').style.display = 'none';
  }

  async function signIn() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showAuthError('Please enter your email and password.'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Signing in...';
    const { error } = await db.auth.signInWithPassword({ email, password });
    btn.disabled = false; btn.textContent = 'Sign In';
    if (error) showAuthError(error.message);
  }

  async function signUp() {
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    if (!email || !password) { showAuthError('Please fill in all fields.'); return; }
    if (password.length < 6) { showAuthError('Password must be at least 6 characters.'); return; }
    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'Creating account...';
    const { error } = await db.auth.signUp({ email, password });
    btn.disabled = false; btn.textContent = 'Create Account';
    if (error) showAuthError(error.message);
    else showAuthSuccess('Account created! Check your email to confirm, then sign in.');
  }

  async function signOut() {
    await db.auth.signOut();
  }

  // ── AUTH STATE ──

  db.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user ?? null;
    if (currentUser) {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appScreen').style.display = 'block';
      document.getElementById('userEmail').textContent = currentUser.email;
      document.getElementById('dateInput').value = todayStr();
      loadContacts();
    } else {
      document.getElementById('authScreen').style.display = 'flex';
      document.getElementById('appScreen').style.display = 'none';
      contacts = [];
    }
  });

  // ── DATA ──

  async function loadContacts() {
    const { data, error } = await db
      .from('contacts')
      .select('*')
      .order('created_at', { ascending: false });
    if (error) { showToast('Error loading contacts.'); return; }
    contacts = data || [];
    render();
  }

  async function addContact() {
    const nameInput = document.getElementById('nameInput');
    const dateInput = document.getElementById('dateInput');
    const name = nameInput.value.trim();
    const email_date = dateInput.value || todayStr();
    if (!name) { nameInput.focus(); showToast('Enter a contact name.'); return; }

    const { data, error } = await db
      .from('contacts')
      .insert({ name, email_date, called: false, user_id: currentUser.id })
      .select()
      .single();

    if (error) { showToast('Error adding contact.'); return; }
    contacts.unshift(data);
    render();
    nameInput.value = '';
    dateInput.value = todayStr();
    nameInput.focus();
    showToast('Contact added!');
  }

  async function toggleCalled(id) {
    const c = contacts.find(c => c.id === id);
    if (!c) return;
    const { error } = await db.from('contacts').update({ called: !c.called }).eq('id', id);
    if (error) { showToast('Error updating.'); return; }
    c.called = !c.called;
    render();
    showToast(c.called ? 'Marked as called!' : 'Unmarked.');
  }

  async function deleteContact(id) {
    const { error } = await db.from('contacts').delete().eq('id', id);
    if (error) { showToast('Error deleting.'); return; }
    contacts = contacts.filter(c => c.id !== id);
    render();
    showToast('Removed.');
  }

  // ── RENDER ──

  function todayStr() {
    return new Date().toISOString().split('T')[0];
  }

  function callDateFor(emailDate) {
    const d = new Date(emailDate + 'T00:00:00');
    d.setDate(d.getDate() + 7);
    return d.toISOString().split('T')[0];
  }

  function formatDate(str) {
    return new Date(str + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function daysUntil(dateStr) {
    const today = new Date(todayStr() + 'T00:00:00');
    const target = new Date(dateStr + 'T00:00:00');
    return Math.round((target - today) / 86400000);
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const today = todayStr();
    const callToday = contacts.filter(c => callDateFor(c.email_date) === today);
    const rest = contacts.filter(c => callDateFor(c.email_date) !== today);

    // Call Today
    const callList = document.getElementById('callList');
    document.getElementById('callBadge').textContent = callToday.filter(c => !c.called).length;

    if (callToday.length === 0) {
      callList.innerHTML = '<div class="empty-call">No one to call today — check back tomorrow.</div>';
    } else {
      callList.innerHTML = callToday.map(c => `
        <div class="call-item ${c.called ? 'called' : ''}">
          <button class="call-check" onclick="toggleCalled('${c.id}')">✓</button>
          <div class="call-name">${escapeHtml(c.name)}</div>
          <div class="call-meta">Emailed ${formatDate(c.email_date)}</div>
        </div>
      `).join('');
    }

    // All contacts
    const sorted = [...rest].sort((a, b) => callDateFor(b.email_date).localeCompare(callDateFor(a.email_date)));
    const pipeline = document.getElementById('pipelineList');

    if (contacts.length === 0) {
      pipeline.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>Log an email above to get started.</p></div>`;
      return;
    }

    if (sorted.length === 0) {
      pipeline.innerHTML = `<div class="empty-state"><div class="empty-icon">🌿</div><p>Everyone is in the "Call Today" list.</p></div>`;
      return;
    }

    pipeline.innerHTML = sorted.map(c => {
      const callDate = callDateFor(c.email_date);
      const diff = daysUntil(callDate);
      let statusClass, pillClass, pillLabel;

      if (c.called) {
        statusClass = ''; pillClass = 'pill-called'; pillLabel = 'Called';
      } else if (diff < 0) {
        statusClass = 'overdue'; pillClass = 'pill-overdue'; pillLabel = `${Math.abs(diff)}d overdue`;
      } else if (diff <= 2) {
        statusClass = 'upcoming'; pillClass = 'pill-upcoming'; pillLabel = diff === 0 ? 'Today' : `In ${diff}d`;
      } else {
        statusClass = ''; pillClass = 'pill-soon'; pillLabel = `In ${diff}d`;
      }

      return `
        <div class="pipeline-item ${statusClass}">
          <div class="pipeline-info">
            <div class="pipeline-name">${escapeHtml(c.name)}</div>
            <div class="pipeline-dates">
              <span>📧 Emailed ${formatDate(c.email_date)}</span>
              <span>📞 Call ${formatDate(callDate)}</span>
            </div>
          </div>
          <span class="status-pill ${pillClass}">${pillLabel}</span>
          <button class="delete-btn" onclick="deleteContact('${c.id}')">✕</button>
        </div>
      `;
    }).join('');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Enter key on name input
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addContact();
  });
  document.getElementById('loginPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') signIn();
  });
</script>
</body>
</html>
